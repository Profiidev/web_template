services:
  frontend:
    image: ghcr.io/profiidev/images/node-gnu-dev:main@sha256:98071687039dfc38aea9dd691f6c555b58f4758b782234eea4cd989c2d47903d
    restart: unless-stopped
    user: '${HOST_UID:-0}:${HOST_GID:-0}'
    volumes:
      - ./frontend:/app/frontend
      - ./node_modules:/app/node_modules
      - ./package-lock.json:/app/package-lock.json
      - ./package.json:/app/package.json
    tty: true
    ports:
      - '5174:5174'
    networks:
      - nginx
    working_dir: /app/frontend
    command: npm run dev -- --host
    #command: npm i

  backend:
    image: ghcr.io/profiidev/images/rust-musl-watch:main@sha256:ec17dc66106621eea023280e31de6e192bbdaffc9b5730ec9bbf6cd3aec15c48
    user: '${HOST_UID:-0}:${HOST_GID:-0}'
    volumes:
      - ./backend:/app
    networks:
      - nginx
    tty: true
    ports:
      - '5173:8000'
    entrypoint: ['tini', '--']
    command: ['cargo', 'watch', '-x', 'run']
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18@sha256:8ff36f3c66371cba71d20ceedccfc3de9669a68737607888c4ef0af93abe8e39
    restart: unless-stopped
    volumes:
      - ./postgres:/var/lib/postgresql
    environment:
      - POSTGRES_PASSWORD=test
      - POSTGRES_USER=test
      - POSTGRES_DB=test
    networks:
      - nginx
    ports:
      - '9301:5432'
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'test']
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 10s
      start_interval: 1s

networks:
  nginx:
