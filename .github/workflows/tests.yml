name: Tests
on:
  pull_request:

jobs:
  backend_test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy,rustfmt

      - name: Cache cargo and rust files
        id: rust_cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
          shared-key: "backend_test_cache"

      - uses: taiki-e/install-action@0c80bcf54d007ab0e714c95f3bcc43c387707535 # nextest
      - name: "Backend Test"
        run: cd backend && cargo nextest run --all-features --nff

      - name: Upload Test Result File
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: test-results-backend
          path: ${{ github.workspace }}/target/nextest/default/junit-backend.xml
          retention-days: 5

  frontend_unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: bahmutov/npm-install@v1
      - name: Generate svelte data
        run: |
          echo "BACKEND_URL=http://localhost:8000" > frontend/.env
          cd frontend && npm run sync && cd ..

      - name: Run tests
        run: cd frontend && npm run test:unit -- --reporter junit --reporter default --outputFile test-results-frontend-unit.xml

      - name: Upload Test Result File
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: test-results-frontend-unit
          path: ${{ github.workspace }}/frontend/test-results-frontend-unit.xml
          retention-days: 5

  frontend_e2e_find_files:
    name: Find E2E Test Files
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.find_files.outputs.FILES }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Find E2E Test Files
        id: find_files
        run: |
          FILES=$(find frontend/src/tests/e2e -name '*.spec.ts' -exec basename {} \; | jq -R . | jq -s -c .)
          echo "Found files: $FILES"
          echo "FILES=$FILES" >> $GITHUB_OUTPUT

  frontend_e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    needs: frontend_e2e_find_files
    strategy:
      matrix:
        file: ${{ fromJson(needs.frontend_e2e_find_files.outputs.files) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: bahmutov/npm-install@v1
      - name: Generate svelte data
        run: |
          echo "BACKEND_URL=http://localhost:8000" > frontend/.env
          cd frontend && npm run sync && cd ..

      - name: Install Playwright Browsers
        run: cd frontend && npx playwright install --with-deps && cd ..

      - name: Build Frontend
        run: cd frontend && npm run build && cd ..

      - name: Run tests
        run: cd frontend && npm run test:e2e src/tests/e2e/${{ matrix.file }}

      - name: Rename JUnit Report
        run: |
          mv ${{ github.workspace }}/frontend/test-results/frontend-e2e.xml ${{ github.workspace }}/frontend/test-results/frontend-e2e-${{ matrix.file }}.xml

      - name: Upload Test Result File
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: test-results-frontend-e2e-${{ matrix.file }}
          path: ${{ github.workspace }}/frontend/test-results/frontend-e2e-${{ matrix.file }}.xml
          retention-days: 5

      - name: Upload Test Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: test-report-frontend-e2e-${{ matrix.file }}
          path: ${{ github.workspace }}/frontend/playwright-report/
          retention-days: 5

  comment_results:
    name: Comment Results to PR
    runs-on: ubuntu-latest
    if: always()
    needs:
      - backend_test
      - frontend_unit
      - frontend_e2e
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          client-id: ${{ secrets.COMMIT_BOT_CLIENT_ID }}
          private-key: ${{ secrets.COMMIT_BOT_PRIVATE_KEY }}
      - name: Download Test Results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: test-results-*
          merge-multiple: true
          path: test-results
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2
        if: always()
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          files: |
            test-results/**/*.xml
